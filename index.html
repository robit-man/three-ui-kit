<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>three-ui-kit - examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #050607;
      color: rgba(235,240,245,0.92);
      font-family: "IBM Plex Mono", "Space Mono", monospace;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(184,136,56,0.08), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(127,214,193,0.05), transparent 35%),
        #050607;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 20;
      width: 320px;
      max-width: 92dvw;
      height: 100dvh;
      border-right: 1px solid rgba(235,240,245,0.1);
      background: linear-gradient(180deg, rgba(11,12,13,0.95), rgba(5,6,7,0.95));
      padding: 20px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #sidebar::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    #sidebar h1 {
      font-size: 16px;
      letter-spacing: 0.12em;
      font-weight: 400;
      color: #B88838;
    }

    #sidebar .subtle {
      font-size: 11px;
      color: rgba(235,240,245,0.52);
      line-height: 1.45;
    }

    #example-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 11px 10px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(235,240,245,0.85);
      background: rgba(11,12,13,0.9);
      border: 1px solid rgba(184,136,56,0.22);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .example-btn:hover {
      border-color: #B88838;
      color: #B88838;
      background: rgba(11,12,13,1);
    }

    .example-btn.active {
      border-color: #B88838;
      color: #B88838;
      background: rgba(184,136,56,0.08);
    }

    #camera-controls,
    #helper-controls,
    #debug-panel {
      border: 1px solid rgba(235,240,245,0.12);
      border-radius: 4px;
      background: rgba(8,9,10,0.9);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #camera-controls h2,
    #debug-panel h2 {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-weight: 400;
      color: rgba(184,136,56,0.95);
    }

    #nav-mode {
      width: 100%;
      font-family: inherit;
      font-size: 11px;
      color: rgba(235,240,245,0.9);
      background: rgba(11,12,13,0.95);
      border: 1px solid rgba(184,136,56,0.28);
      border-radius: 4px;
      padding: 7px 8px;
      outline: none;
    }

    #nav-mode:focus {
      border-color: #B88838;
    }

    #pointer-lock-btn,
    .helper-action-btn,
    #helpers-toggle {
      width: 100%;
      text-align: center;
      padding: 9px 8px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(235,240,245,0.85);
      background: rgba(11,12,13,0.95);
      border: 1px solid rgba(184,136,56,0.28);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    #pointer-lock-btn:hover,
    .helper-action-btn:hover,
    #helpers-toggle:hover {
      border-color: #B88838;
      color: #B88838;
    }

    #pointer-lock-btn:disabled,
    .helper-action-btn:disabled {
      cursor: not-allowed;
      color: rgba(235,240,245,0.45);
      border-color: rgba(235,240,245,0.16);
      background: rgba(11,12,13,0.7);
    }

    #helpers-toggle.active {
      border-color: #B88838;
      color: #B88838;
      background: rgba(184,136,56,0.1);
    }

    .helper-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      line-height: 1.25;
      color: rgba(235,240,245,0.78);
      user-select: none;
    }

    .helper-row input {
      accent-color: #B88838;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    #debug-output {
      margin: 0;
      font-family: inherit;
      font-size: 10px;
      line-height: 1.45;
      color: rgba(235,240,245,0.72);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 148px;
    }

    #status {
      margin-top: auto;
      border-top: 1px solid rgba(235,240,245,0.08);
      padding-top: 10px;
      min-height: 44px;
      font-size: 11px;
      color: rgba(235,240,245,0.45);
      line-height: 1.5;
    }

    #viewport-wrap {
      position: absolute;
      inset: 0;
      width: 100dvw;
      height: 100dvh;
      z-index: 0;
    }

    #viewport {
      position: absolute;
      inset: 0;
      width: 100dvw;
      height: 100dvh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 1040px) {
      #sidebar {
        width: min(320px, 92dvw);
      }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>+ THREE-UI-KIT</h1>
    <p class="subtle">Menu system demos. Switch examples at any time.</p>

    <div id="example-list">
      <button class="example-btn" data-example="1">1 - Object-Anchored Loadout Panel</button>
      <button class="example-btn" data-example="2">2 - Camera HUD: Radial Dial + Readouts</button>
      <button class="example-btn" data-example="3">3 - VR Wrist Menu</button>
      <button class="example-btn" data-example="4">4 - Phone Touch Overlay</button>
    </div>

    <section id="camera-controls" aria-label="Camera navigation controls">
      <h2>Camera Navigation</h2>
      <label class="subtle" for="nav-mode">Mode</label>
      <select id="nav-mode">
        <option value="orbit">Orbit Controls</option>
        <option value="static">Static Camera</option>
        <option value="fly">Fly Controls</option>
        <option value="pointer-lock">Pointer Lock Controls</option>
      </select>
      <button id="pointer-lock-btn" type="button" disabled>Lock Pointer</button>
      <p class="subtle">Fly: hold mouse button and use WASD + Space/Shift. Pointer lock: WASD + mouse look.</p>
    </section>

    <section id="helper-controls" aria-label="Helper controls">
      <button id="helpers-toggle" type="button" aria-pressed="false">Helpers: OFF</button>
      <label class="helper-row">
        <input id="toggle-anchor-axes" type="checkbox">
        <span>Anchor Axes</span>
      </label>
      <label class="helper-row">
        <input id="toggle-element-axes" type="checkbox">
        <span>Element Axes</span>
      </label>
      <label class="helper-row">
        <input id="toggle-grid-coords" type="checkbox">
        <span>Grid Coordinates</span>
      </label>
      <label class="helper-row">
        <input id="toggle-hit-regions" type="checkbox">
        <span>Hit Regions</span>
      </label>
      <label class="helper-row">
        <input id="toggle-layout-bounds" type="checkbox">
        <span>Layout Bounds</span>
      </label>
      <button class="helper-action-btn" id="attach-grid-btn" type="button">Attach UI To Hover Grid</button>
      <button class="helper-action-btn" id="restore-anchor-btn" type="button">Restore UI Anchor</button>
    </section>

    <section id="debug-panel" aria-live="polite">
      <h2>Hover Inspector</h2>
      <pre id="debug-output">No active example.</pre>
    </section>

    <div id="status">Select an example.</div>
  </aside>

  <main id="viewport-wrap">
    <div id="viewport"></div>
  </main>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./node_modules/three/build/three.module.js",
    "three/examples/jsm/": "./node_modules/three/examples/jsm/",
    "troika-three-text": "./node_modules/troika-three-text/dist/troika-three-text.esm.js",
    "troika-worker-utils": "./node_modules/troika-worker-utils/dist/troika-worker-utils.esm.js",
    "troika-three-utils": "./node_modules/troika-three-utils/dist/troika-three-utils.esm.js",
    "webgl-sdf-generator": "./node_modules/webgl-sdf-generator/dist/webgl-sdf-generator.mjs",
    "bidi-js": "./node_modules/bidi-js/dist/bidi.mjs"
  }
}
</script>

<script type="module">
import {
  Scene,
  PerspectiveCamera,
  WebGLRenderer,
  Object3D,
} from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
import { FlyControls } from "three/examples/jsm/controls/FlyControls.js";
import { PointerLockControls } from "three/examples/jsm/controls/PointerLockControls.js";

const viewport = document.getElementById("viewport");
const status = document.getElementById("status");
const buttons = Array.from(document.querySelectorAll(".example-btn"));

const navModeSelect = document.getElementById("nav-mode");
const pointerLockBtn = document.getElementById("pointer-lock-btn");

const helpersToggleBtn = document.getElementById("helpers-toggle");
const toggleAnchorAxes = document.getElementById("toggle-anchor-axes");
const toggleElementAxes = document.getElementById("toggle-element-axes");
const toggleGridCoords = document.getElementById("toggle-grid-coords");
const toggleHitRegions = document.getElementById("toggle-hit-regions");
const toggleLayoutBounds = document.getElementById("toggle-layout-bounds");
const attachGridBtn = document.getElementById("attach-grid-btn");
const restoreAnchorBtn = document.getElementById("restore-anchor-btn");
const debugOutput = document.getElementById("debug-output");

const EXAMPLES = {
  "1": {
    factory: "createLoadoutPanelExample",
    load: () => import("./dist/examples/example1-loadout-panel.js"),
    info: "Example 1 - Object-anchored Loadout Panel - BILLBOARD_YAW facing",
  },
  "2": {
    factory: "createCameraHudExample",
    load: () => import("./dist/examples/example2-camera-hud.js"),
    info: "Example 2 - Camera HUD - FOV-fit responsive, slider controls brightness",
  },
  "3": {
    factory: "createVRWristMenuExample",
    load: () => import("./dist/examples/example3-vr-wrist-menu.js"),
    info: "Example 3 - VR Wrist Menu - LOCK_UP + yaw-toward-head facing",
  },
  "4": {
    factory: "createPhoneTouchExample",
    load: () => import("./dist/examples/example4-phone-touch.js"),
    info: "Example 4 - Phone Touch - 44px hit targets, film grain toggle",
  },
};

let renderer;
let scene;
let camera;
let activeRuntime = null;
let activeExampleId = null;

const debugState = {
  showAnchorAxes: false,
  showElementAxes: false,
  showGridCoords: false,
  showHitRegions: false,
  showLayoutBounds: false,
};

const runtimeOriginalAnchors = new WeakMap();
const runtimeGridAnchorTargets = new WeakMap();

let navMode = "orbit";
let orbitControls = null;
let flyControls = null;
let pointerLockControls = null;
let navLoopStarted = false;
let navLastTime = performance.now();
const pointerLockKeys = new Set();
let viewportResizeObserver = null;

if (navModeSelect) {
  navModeSelect.value = navMode;
}

function getRuntimeUIManager(runtime = activeRuntime) {
  if (!runtime || typeof runtime !== "object") return null;
  return runtime.uiManager ?? null;
}

function getRuntimeBackdrop(runtime = activeRuntime) {
  if (!runtime || typeof runtime !== "object") return null;
  return runtime.backdrop ?? null;
}

function getRuntimeRoot(runtime = activeRuntime) {
  if (!runtime || typeof runtime !== "object") return null;
  return runtime.root ?? null;
}

function hasHelpersEnabled() {
  return (
    debugState.showAnchorAxes ||
    debugState.showElementAxes ||
    debugState.showGridCoords
  );
}

function formatNum(v) {
  return Number.isFinite(v) ? v.toFixed(3) : "n/a";
}

function formatVec3(v) {
  return `${formatNum(v.x)}, ${formatNum(v.y)}, ${formatNum(v.z)}`;
}

function formatQuat(v) {
  return `${formatNum(v.x)}, ${formatNum(v.y)}, ${formatNum(v.z)}, ${formatNum(v.w)}`;
}

function getViewportSize() {
  const width = Math.max(1, viewport.clientWidth);
  const height = Math.max(1, viewport.clientHeight);
  return { width, height };
}

function setButtonActive(exampleId) {
  for (const btn of buttons) {
    btn.classList.toggle("active", btn.dataset.example === exampleId);
  }
}

function syncDebugControls() {
  const helpersEnabled = hasHelpersEnabled();
  helpersToggleBtn.textContent = helpersEnabled ? "Helpers: ON" : "Helpers: OFF";
  helpersToggleBtn.classList.toggle("active", helpersEnabled);
  helpersToggleBtn.setAttribute("aria-pressed", helpersEnabled ? "true" : "false");

  toggleAnchorAxes.checked = debugState.showAnchorAxes;
  toggleElementAxes.checked = debugState.showElementAxes;
  toggleGridCoords.checked = debugState.showGridCoords;
  toggleHitRegions.checked = debugState.showHitRegions;
  toggleLayoutBounds.checked = debugState.showLayoutBounds;
}

function syncPointerLockButton() {
  const pointerMode = navMode === "pointer-lock";
  pointerLockBtn.disabled = !pointerMode || !pointerLockControls;
  if (!pointerMode || !pointerLockControls) {
    pointerLockBtn.textContent = "Lock Pointer";
    return;
  }
  pointerLockBtn.textContent = pointerLockControls.isLocked
    ? "Unlock Pointer"
    : "Lock Pointer";
}

function applyDebugStateToRuntime(runtime = activeRuntime) {
  const uiManager = getRuntimeUIManager(runtime);
  if (uiManager) {
    if (typeof uiManager.setDebugHelpersEnabled === "function") {
      uiManager.setDebugHelpersEnabled(
        debugState.showAnchorAxes || debugState.showElementAxes
      );
    }

    if (uiManager.debug && typeof uiManager.debug === "object") {
      uiManager.debug.showAnchorAxes = debugState.showAnchorAxes;
      uiManager.debug.showElementAxes = debugState.showElementAxes;
      uiManager.debug.showHitRegions = debugState.showHitRegions;
      uiManager.debug.showLayoutBounds = debugState.showLayoutBounds;
    }
  }

  const backdrop = getRuntimeBackdrop(runtime);
  if (backdrop && typeof backdrop.setCoordinateLabelsEnabled === "function") {
    backdrop.setCoordinateLabelsEnabled(debugState.showGridCoords);
  }
}

function updateBackdropRayFromClient(event) {
  const backdrop = getRuntimeBackdrop();
  if (!camera || !renderer || !backdrop || typeof backdrop.updatePointerRay !== "function") {
    return false;
  }

  const rect = renderer.domElement.getBoundingClientRect();
  if (rect.width <= 0 || rect.height <= 0) return false;

  const ndcX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  const ndcY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  backdrop.updatePointerRay(camera, ndcX, ndcY);
  return true;
}

function handleCanvasPointerMove(event) {
  updateBackdropRayFromClient(event);
}

function handleCanvasPointerLeave() {
  const backdrop = getRuntimeBackdrop();
  if (backdrop && typeof backdrop.clearPointerHover === "function") {
    backdrop.clearPointerHover();
  }
}

function cacheRuntimeAnchor(runtime) {
  if (!runtime || runtimeOriginalAnchors.has(runtime)) return;
  const root = getRuntimeRoot(runtime);
  if (!root || !root.anchor) return;
  runtimeOriginalAnchors.set(runtime, {
    target: root.anchor.target,
    mode: root.anchor.mode,
    facing: root.anchor.facing,
    offsetPos: root.anchor.offsetPos.clone(),
    offsetRot: root.anchor.offsetRot.clone(),
    smoothingHz: root.anchor.smoothingHz,
    customFacing: root.anchor.customFacing,
  });
}

function handleCanvasClick(event) {
  const backdrop = getRuntimeBackdrop();
  if (!backdrop) return;

  updateBackdropRayFromClient(event);

  if (typeof backdrop.toggleSelectedFromHover !== "function") return;
  const result = backdrop.toggleSelectedFromHover(false);
  if (result === "selected" && typeof backdrop.getSelectedGridSnapshot === "function") {
    const selected = backdrop.getSelectedGridSnapshot(false);
    if (selected) {
      status.textContent = `Selected grid point ${selected.label}.`;
    }
  } else if (result === "cleared") {
    status.textContent = "Selected grid point cleared.";
  }
}

function attachRootToSelectedGridPoint() {
  const runtime = activeRuntime;
  const root = getRuntimeRoot(runtime);
  const backdrop = getRuntimeBackdrop(runtime);
  if (!runtime || !root || !root.anchor || !backdrop) {
    status.textContent = "No active runtime with root/backdrop found.";
    return;
  }

  if (typeof backdrop.getSelectedGridPoint !== "function") {
    status.textContent = "Backdrop does not support selected grid point snapping.";
    return;
  }

  const groundedPoint = backdrop.getSelectedGridPoint(true);
  if (!groundedPoint) {
    status.textContent = "Click a grid point to select it first, then attach UI.";
    return;
  }

  let anchorTarget = runtimeGridAnchorTargets.get(runtime);
  if (!anchorTarget) {
    anchorTarget = new Object3D();
    anchorTarget.name = "runtime-grid-ui-anchor";
    scene.add(anchorTarget);
    runtimeGridAnchorTargets.set(runtime, anchorTarget);
  }
  anchorTarget.position.copy(groundedPoint);

  root.anchor.target = anchorTarget;
  root.anchor.mode = "object";
  root.anchor.facing = "BILLBOARD_YAW";
  root.anchor.offsetPos.set(0, 0.22, 0);
  root.anchor.offsetRot.identity();
  root.anchor.smoothingHz = 12;
  root.anchor.customFacing = undefined;

  status.textContent = `UI attached to selected grid point (${Math.round(groundedPoint.x)}, 0, ${Math.round(groundedPoint.z)}).`;
}

function restoreRuntimeAnchor() {
  const runtime = activeRuntime;
  const root = getRuntimeRoot(runtime);
  if (!runtime || !root || !root.anchor) {
    status.textContent = "No active runtime root anchor to restore.";
    return;
  }

  const saved = runtimeOriginalAnchors.get(runtime);
  if (!saved) {
    status.textContent = "No saved anchor state was captured for this runtime.";
    return;
  }

  root.anchor.target = saved.target;
  root.anchor.mode = saved.mode;
  root.anchor.facing = saved.facing;
  root.anchor.offsetPos.copy(saved.offsetPos);
  root.anchor.offsetRot.copy(saved.offsetRot);
  root.anchor.smoothingHz = saved.smoothingHz;
  root.anchor.customFacing = saved.customFacing;

  const anchorTarget = runtimeGridAnchorTargets.get(runtime);
  if (anchorTarget) {
    anchorTarget.removeFromParent();
    runtimeGridAnchorTargets.delete(runtime);
  }

  status.textContent = "UI anchor restored to runtime default.";
}

function disposeNavigationControls() {
  if (orbitControls) {
    orbitControls.dispose();
    orbitControls = null;
  }

  if (flyControls) {
    if (typeof flyControls.dispose === "function") {
      flyControls.dispose();
    }
    flyControls = null;
  }

  if (pointerLockControls) {
    if (pointerLockControls.isLocked) {
      pointerLockControls.unlock();
    }
    pointerLockControls.disconnect();
    pointerLockControls = null;
  }
  pointerLockKeys.clear();
  syncPointerLockButton();
}

function applyNavigationMode() {
  if (!camera || !renderer) return;
  disposeNavigationControls();

  if (navMode === "orbit") {
    orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.09;
    orbitControls.target.set(0, 1.0, -3);
    orbitControls.update();
  } else if (navMode === "fly") {
    flyControls = new FlyControls(camera, renderer.domElement);
    flyControls.movementSpeed = 2.8;
    flyControls.rollSpeed = Math.PI / 5;
    flyControls.dragToLook = true;
    flyControls.autoForward = false;
  } else if (navMode === "pointer-lock") {
    pointerLockControls = new PointerLockControls(camera, renderer.domElement);
    pointerLockControls.addEventListener("lock", syncPointerLockButton);
    pointerLockControls.addEventListener("unlock", syncPointerLockButton);
  }

  syncPointerLockButton();
}

function updatePointerLockMovement(dt) {
  if (!pointerLockControls || !pointerLockControls.isLocked) return;
  const speed = 2.4;
  const dist = speed * dt;

  if (pointerLockKeys.has("KeyW")) pointerLockControls.moveForward(dist);
  if (pointerLockKeys.has("KeyS")) pointerLockControls.moveForward(-dist);
  if (pointerLockKeys.has("KeyA")) pointerLockControls.moveRight(-dist);
  if (pointerLockKeys.has("KeyD")) pointerLockControls.moveRight(dist);
  if (pointerLockKeys.has("Space")) camera.position.y += dist;
  if (pointerLockKeys.has("ShiftLeft") || pointerLockKeys.has("ShiftRight")) {
    camera.position.y -= dist;
  }
}

function startNavigationLoop() {
  if (navLoopStarted) return;
  navLoopStarted = true;

  const frame = (ts) => {
    const dt = Math.min(0.05, Math.max(0, (ts - navLastTime) / 1000));
    navLastTime = ts;

    if (orbitControls) {
      orbitControls.update();
    } else if (flyControls) {
      flyControls.update(dt);
    } else if (pointerLockControls) {
      updatePointerLockMovement(dt);
    }

    requestAnimationFrame(frame);
  };
  requestAnimationFrame(frame);
}

function handleResize() {
  if (!renderer || !camera) return;

  const { width, height } = getViewportSize();
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height, false);

  if (activeRuntime && typeof activeRuntime.onResize === "function") {
    activeRuntime.onResize(width, height);
  }
}

function ensureThree() {
  if (renderer) return;

  renderer = new WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x050607);
  viewport.appendChild(renderer.domElement);

  scene = new Scene();
  const { width, height } = getViewportSize();
  camera = new PerspectiveCamera(55, width / height, 0.05, 100);
  camera.position.set(0, 1.6, 1);
  camera.lookAt(0, 1.0, -3);

  renderer.domElement.addEventListener("pointermove", handleCanvasPointerMove);
  renderer.domElement.addEventListener("pointerleave", handleCanvasPointerLeave);
  renderer.domElement.addEventListener("click", handleCanvasClick);

  if (typeof ResizeObserver !== "undefined") {
    viewportResizeObserver = new ResizeObserver(() => {
      handleResize();
    });
    viewportResizeObserver.observe(viewport);
  }

  applyNavigationMode();
  handleResize();
}

window.addEventListener("keydown", (event) => {
  pointerLockKeys.add(event.code);
});
window.addEventListener("keyup", (event) => {
  pointerLockKeys.delete(event.code);
});
window.addEventListener("resize", handleResize);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", handleResize);
}

async function unloadActiveRuntime() {
  if (!activeRuntime) return;

  const anchorTarget = runtimeGridAnchorTargets.get(activeRuntime);
  if (anchorTarget) {
    anchorTarget.removeFromParent();
    runtimeGridAnchorTargets.delete(activeRuntime);
  }

  const backdrop = getRuntimeBackdrop(activeRuntime);
  if (backdrop && typeof backdrop.clearPointerHover === "function") {
    backdrop.clearPointerHover();
  }
  if (backdrop && typeof backdrop.clearSelectedPoint === "function") {
    backdrop.clearSelectedPoint();
  }

  try {
    if (typeof activeRuntime.stop === "function") activeRuntime.stop();
    if (typeof activeRuntime.dispose === "function") activeRuntime.dispose();
  } catch (err) {
    console.error("[examples] error while disposing runtime", err);
  } finally {
    activeRuntime = null;
  }
}

async function loadExample(exampleId) {
  const def = EXAMPLES[exampleId];
  if (!def) return;

  ensureThree();
  status.textContent = "Loading...";
  setButtonActive(exampleId);

  await unloadActiveRuntime();

  try {
    const mod = await def.load();
    const createFn = mod[def.factory];
    if (typeof createFn !== "function") {
      throw new Error(`Factory "${def.factory}" not found`);
    }

    const runtime = createFn(renderer, scene, camera);
    activeRuntime = runtime;
    activeExampleId = exampleId;
    cacheRuntimeAnchor(runtime);

    applyDebugStateToRuntime(activeRuntime);
    handleResize();

    if (runtime && typeof runtime.start === "function") {
      runtime.start();
    } else if (runtime && typeof runtime.animate === "function") {
      runtime.animate();
    } else {
      throw new Error("Example runtime missing start()/animate()");
    }

    status.textContent = def.info;
  } catch (err) {
    console.error("[examples] failed to load example", err);
    status.textContent = `Failed to load example ${exampleId}. Check console.`;
    setButtonActive(activeExampleId);
  }
}

function renderDebugPanel() {
  const uiManager = getRuntimeUIManager();
  const backdrop = getRuntimeBackdrop();
  if (!uiManager || typeof uiManager.getDebugSnapshot !== "function") {
    debugOutput.textContent = "No active example.";
    requestAnimationFrame(renderDebugPanel);
    return;
  }

  const snapshot = uiManager.getDebugSnapshot();
  const gridSnapshot =
    backdrop && typeof backdrop.getHoveredGridSnapshot === "function"
      ? backdrop.getHoveredGridSnapshot(false)
      : null;
  const selectedGridSnapshot =
    backdrop && typeof backdrop.getSelectedGridSnapshot === "function"
      ? backdrop.getSelectedGridSnapshot(false)
      : null;

  if (!snapshot) {
    const gridInfo = [
      gridSnapshot
        ? `Grid hover: ${gridSnapshot.label}\nGrid world: ${formatVec3(gridSnapshot.world)}`
        : "Grid hover: none",
      selectedGridSnapshot
        ? `Grid selected: ${selectedGridSnapshot.label}\nSelected world: ${formatVec3(selectedGridSnapshot.world)}`
        : "Grid selected: none",
    ].join("\n");
    debugOutput.textContent = `Hover an interactive UI element.\n${gridInfo}`;
    requestAnimationFrame(renderDebugPanel);
    return;
  }

  const hit = snapshot.hitRegion
    ? `${formatNum(snapshot.hitRegion.x)}, ${formatNum(snapshot.hitRegion.y)}, ${formatNum(snapshot.hitRegion.w)}, ${formatNum(snapshot.hitRegion.h)}, slop=${formatNum(snapshot.hitRegion.slop)}`
    : "none";
  const gridLine = gridSnapshot ? gridSnapshot.label : "none";
  const gridWorld = gridSnapshot ? formatVec3(gridSnapshot.world) : "n/a";
  const selectedGridLine = selectedGridSnapshot ? selectedGridSnapshot.label : "none";
  const selectedGridWorld = selectedGridSnapshot
    ? formatVec3(selectedGridSnapshot.world)
    : "n/a";

  debugOutput.textContent = [
    `pointer: ${snapshot.pointerId}`,
    `element: ${snapshot.elementId}`,
    `uuid: ${snapshot.elementUuid}`,
    `local pos: ${formatVec3(snapshot.localPosition)}`,
    `world pos: ${formatVec3(snapshot.worldPosition)}`,
    `world quat: ${formatQuat(snapshot.worldQuaternion)}`,
    `world euler deg: ${formatVec3(snapshot.worldEulerDeg)}`,
    `size: ${formatNum(snapshot.computedSize.width)} x ${formatNum(snapshot.computedSize.height)}`,
    `hit region: ${hit}`,
    `grid hover: ${gridLine}`,
    `grid world: ${gridWorld}`,
    `grid selected: ${selectedGridLine}`,
    `selected world: ${selectedGridWorld}`,
    `camera mode: ${navMode}`,
  ].join("\n");

  requestAnimationFrame(renderDebugPanel);
}

for (const btn of buttons) {
  btn.addEventListener("click", () => {
    const id = btn.dataset.example;
    if (!id || id === activeExampleId) return;
    loadExample(id);
  });
}

navModeSelect.addEventListener("change", () => {
  navMode = navModeSelect.value;
  applyNavigationMode();
});

pointerLockBtn.addEventListener("click", () => {
  if (!pointerLockControls) return;
  if (pointerLockControls.isLocked) {
    pointerLockControls.unlock();
  } else {
    pointerLockControls.lock();
  }
});

helpersToggleBtn.addEventListener("click", () => {
  const enable = !hasHelpersEnabled();
  if (enable) {
    if (!debugState.showAnchorAxes) debugState.showAnchorAxes = true;
    if (!debugState.showElementAxes) debugState.showElementAxes = true;
    if (!debugState.showGridCoords) debugState.showGridCoords = true;
  } else {
    debugState.showAnchorAxes = false;
    debugState.showElementAxes = false;
    debugState.showGridCoords = false;
  }

  syncDebugControls();
  applyDebugStateToRuntime();
});

toggleAnchorAxes.addEventListener("change", () => {
  debugState.showAnchorAxes = toggleAnchorAxes.checked;
  syncDebugControls();
  applyDebugStateToRuntime();
});

toggleElementAxes.addEventListener("change", () => {
  debugState.showElementAxes = toggleElementAxes.checked;
  syncDebugControls();
  applyDebugStateToRuntime();
});

toggleGridCoords.addEventListener("change", () => {
  debugState.showGridCoords = toggleGridCoords.checked;
  syncDebugControls();
  applyDebugStateToRuntime();
});

toggleHitRegions.addEventListener("change", () => {
  debugState.showHitRegions = toggleHitRegions.checked;
  applyDebugStateToRuntime();
});

toggleLayoutBounds.addEventListener("change", () => {
  debugState.showLayoutBounds = toggleLayoutBounds.checked;
  applyDebugStateToRuntime();
});

attachGridBtn.addEventListener("click", attachRootToSelectedGridPoint);
restoreAnchorBtn.addEventListener("click", restoreRuntimeAnchor);

syncDebugControls();
syncPointerLockButton();
startNavigationLoop();
renderDebugPanel();
</script>
</body>
</html>
